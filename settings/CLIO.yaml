#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------
# Viewer.on: 1 is ON, 0 is OFF
Viewer.on: 1

Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 1
Viewer.LineSize: 1
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3
Viewer.ViewpointX: 0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500

Viewer.ViewpointYtop: -4.0

   
#--------------------------------------------------------------------------------------------
# Camera Parameters. Adjust them!
#--------------------------------------------------------------------------------------------

# width: 640
# height: 360
# cx: 315.9902073557914
# cy: 254.59437002701452
# fx: 372.4634094238281
# fy: 371.5072021484375

# Camera calibration and distortion parameters (OpenCV) 
Camera.fx: 372.4634094238281
Camera.fy: 371.5072021484375
Camera.cx: 315.9902073557914
Camera.cy: 254.59437002701452

Camera.k1: 0.0
Camera.k2: 0.0
Camera.p1: 0.0
Camera.p2: 0.0
Camera.k3: 0.0

Camera.width: 640
Camera.height: 480

# Camera frames per second (CLIO office bag: ~7.5 Hz, dt ~= 133 ms)
Camera.fps: 7.5

# Stereo baseline (b) times fx. CLIO scenes use Intel RealSense D455 (95 mm IR baseline).
# bf = 0.095 * Camera.fx. Used for RGB-D pseudo-stereo (u_r = u - bf/depth) and far-depth filtering.
# Previous generic value 40.0 implied ~107 mm baseline (~12% too large for D455).
Camera.bf: 35.4

# Color order of the images (0: BGR, 1: RGB. It is ignored if images are grayscale)
Camera.RGB: 1

# Close/Far threshold in units of baseline b (far cutoff in meters = b * ThDepth).
# With D455 b=95 mm and ThDepth=40, map points beyond ~3.8 m are discarded (fine for indoor CLIO).
ThDepth: 40.0

# Depthmap values factor (CLIO depth PNGs are uint16 in millimeters)
DepthMapFactor: 1000.0

#--------------------------------------------------------------------------------------------
# Features extraction 
#--------------------------------------------------------------------------------------------

FeatureTrackerConfig.nFeatures: 1000

